services:
  wagecore-api:
    container_name: wagecore-api
    build:
      context: .
      dockerfile: ../src/Web.Api/Dockerfile
    ports:
      - "9090:8080"
    depends_on:
      - wagecore-sql
  wagecore-sql:
    container_name: wagecore-sql
    image: mcr.microsoft.com/mssql/server:2025-latest
    ports:
      - "1433:1433"
    environment:
      SA_PASSWORD: "MyStrongP@ssw0rd"
      ACCEPT_EULA: "Y"