services:
  wagecore-api:
    container_name: wagecore-api
    build:
      context: ../src
      dockerfile: Web.Api/Dockerfile
    ports:
      - "9090:8080"
    environment:
      - ApplicationSettings__Databases__ConnectionString=Server=wagecore-sql,1433;Database=WageCore;User Id=sa;Password=MyStrongP@ssw0rd;TrustServerCertificate=True;
    depends_on:
      wagecore-sql:
        condition: service_healthy
  wagecore-sql:
    container_name: wagecore-sql
    image: mcr.microsoft.com/mssql/server:2025-latest
    ports:
      - "1433:1433"
    environment:
      SA_PASSWORD: "MyStrongP@ssw0rd"
      ACCEPT_EULA: "Y"
    volumes:
      - sql_data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$$SA_PASSWORD\" -C -Q 'SELECT 1' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  sql_data: